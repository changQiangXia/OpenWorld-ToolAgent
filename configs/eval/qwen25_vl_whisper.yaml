task_name: open_world_tool_agent
model_name: qwen25_vl_7b_whisper
seed: 42
unknown_token: __unknown__

data:
  split_name: dev
  split_file_template: data/splits/{split}.jsonl
  max_samples: 0

tools:
  - search_web
  - ocr_image
  - transcribe_audio
  - qa_text
  - summarize_text

models:
  qwen_model_dir: models/Qwen2.5-VL-7B-Instruct
  whisper_model_dir: models/whisper-large-v3
  trust_remote_code: true
  load_in_4bit: false
  use_flash_attention_2: false

runtime:
  device: cuda:0
  dtype: bfloat16
  media_mode: multimodal
  video_frame_strategy: first_frame
  unknown_threshold: 0.55
  retriever_top_k: 4
  cost_per_request_usd: 0.0

generation:
  max_new_tokens: 96
  do_sample: false
  temperature: 0.0
  top_p: 1.0

asr:
  chunk_length_s: 30.0
  batch_size: 8
  language: zh

output_dirs:
  logs: outputs/logs
  predictions: outputs/predictions
  reports: outputs/reports

